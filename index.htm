<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>虛源靈流 - 靈流狂徒</title>
    <style>
        :root { --main: #00f2ff; --bg: #030303; --border: rgba(0, 242, 255, 0.2); }
        body { background: var(--bg); color: #ccc; margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #star-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .sidebar { width: 260px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 1002; }
        .menu-item { padding: 20px 30px; cursor: pointer; color: #555; font-size: 0.9rem; letter-spacing: 2px; border-left: 3px solid transparent; }
        .menu-item.active { color: var(--main); background: rgba(0,242,255,0.05); border-left-color: var(--main); }
        .view { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #scroll-content { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }
        .content-body { max-width: 900px; margin: 0 auto; line-height: 2.2; white-space: pre-wrap; font-size: 1.1rem; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; height: 100vh; }
            .sidebar.open { left: 0; }
            .view { padding-top: 60px; }
        }
    </style>
</head>
<body>
    <canvas id="star-canvas"></canvas>
    <nav class="sidebar" id="nav">
        <div style="padding:40px 20px; text-align:center; color:var(--main); letter-spacing:5px;">虛源靈流</div>
        <div class="menu-item" onclick="sw('01_虛源宣言_Declaration')">◇ 虛源宣言</div>
        <div class="menu-item" onclick="sw('05_內容願景_Vision')">◇ 內容願景</div>
        <div class="menu-item" onclick="sw('02_靈流光譜_Spectrum')">◇ 靈流光譜</div>
        <div class="menu-item" onclick="sw('oracle')">◇ 答案之書</div>
        <div class="menu-item" onclick="sw('tarot')">◇ 靈流塔羅</div>
        <div class="menu-item" onclick="sw('daily')">◇ 今日建議</div>
        <div class="menu-item" onclick="sw('test')">◇ 命運診斷</div>
    </nav>
    <div class="view">
        <header><div id="title" style="color:var(--main);">系統載入中...</div></header>
        <div id="scroll-content"></div>
    </div>
<script>
    // FIX v4: Updated to latest GAS deployment
    const URL = "https://script.google.com/macros/s/AKfycbwFlc-X9sT999pS-mSWEHenX2PkfT54MqBSwBcOLa3GFuWi1mdrVfqFtJh76ck-mFm5/exec";

    // FIX v4: Added loadSpectrum() — loads a spectrum item's content
    async function loadSpectrum(name) {
        document.getElementById('title').innerText = '◈ ' + name;
        const box = document.getElementById('scroll-content');
        box.innerHTML = "正在同步阿卡西數據...";
        try {
            const res = await fetch(URL + '?action=getContent&folder=' + encodeURIComponent(name));
            const data = await res.json();
            box.innerHTML = `<div class="content-body">${(data.reply || '').replace(/\n/g, '<br>')}</div>`;
        } catch(e) {
            box.innerHTML = `<div class="content-body" style="color:#f55;">讀取失敗：${e.message}</div>`;
        }
    }

    // FIX v4: Added triggerDiagnosis() for sw('test') diagnosis feature
    async function triggerDiagnosis() {
        const box = document.getElementById('scroll-content');
        box.innerHTML = `<div class="content-body" style="text-align:center; padding:60px;">
            <div style="color:var(--main); font-size:2rem; margin-bottom:30px;">命運判讀系統</div>
            <div style="color:#888; margin-bottom:40px;">輸入你的命運代碼，揭示你的核心枷鎖與解鎖鑰</div>
            <textarea id="diagnosis-input" rows="3" style="width:100%; max-width:400px; background:#111; border:1px solid var(--border); color:#ccc; padding:15px; font-size:1.1rem; resize:none; outline:none;" placeholder="輸入 30 位命運代碼..."></textarea>
            <br><br>
            <button onclick="runDiagnosis()" style="background:var(--main); color:#000; padding:15px 40px; border:none; cursor:pointer; font-size:1.1rem;">◈ 啟動判讀 ◈</button>
            <div id="diagnosis-result" style="margin-top:30px;"></div>
        </div>`;
    }

    async function runDiagnosis() {
        const code = document.getElementById('diagnosis-input').value.trim().toUpperCase();
        if (!code) { alert('請輸入命運代碼'); return; }
        const result = document.getElementById('diagnosis-result');
        result.innerHTML = `<div style="color:var(--main);">◈ 命運校準中...</div>`;
        try {
            const res = await fetch(URL + '?action=getDiagnosis&code=' + encodeURIComponent(code));
            const data = await res.json();
            result.innerHTML = `<div class="content-body" style="border:1px solid var(--main); padding:30px; margin-top:20px; white-space:pre-wrap;">${(data.reply || '').replace(/\n/g, '<br>')}</div>`;
        } catch(e) {
            result.innerHTML = `<div style="color:#f55; margin-top:20px;">判讀失敗：${e.message}</div>`;
        }
    }

    async function sw(m) {
        // FIX v4: titleMap includes 'test'
        const titleMap = {
            '01_虛源宣言_Declaration': '虛源宣言',
            '05_內容願景_Vision': '內容願景',
            '02_靈流光譜_Spectrum': '靈流光譜',
            'oracle': '答案之書',
            'tarot': '靈流塔羅',
            'daily': '今日建議',
            'test': '命運診斷'
        };
        document.getElementById('title').innerText = titleMap[m] || '模組';
        const box = document.getElementById('scroll-content');

        if (['01_虛源宣言_Declaration', '05_內容願景_Vision'].includes(m)) {
            box.innerHTML = "正在同步阿卡西數據...";
            try {
                const res = await fetch(URL + '?action=getContent&folder=' + encodeURIComponent(m));
                const data = await res.json();
                // FIX v4: replace \n with <br>
                box.innerHTML = `<div class="content-body">${(data.reply || '').replace(/\n/g, '<br>')}</div>`;
            } catch(e) {
                box.innerHTML = `<div class="content-body" style="color:#f55;">讀取失敗：${e.message}</div>`;
            }
        } else if (m === 'oracle' || m === 'tarot' || m === 'daily') {
            const action = m === 'oracle' ? "getOracle" : (m === 'tarot' ? "getTarot" : "getDaily");
            box.innerHTML = `<button onclick="trigger('${action}')" style="background:var(--main); padding:20px; border:none; cursor:pointer; color:#000; font-size:1.1rem;">◈ 感應當下頻率 ◈</button><div id="res-box"></div>`;
        } else if (m === '02_靈流光譜_Spectrum') {
            box.innerHTML = "正在同步阿卡西數據...";
            try {
                const res = await fetch(URL + '?action=getList');
                const data = await res.json();
                box.innerHTML = "";
                data.list.forEach(n => {
                    const item = document.createElement('div');
                    item.style.cssText = 'cursor:pointer; padding:15px; border-bottom:1px solid #111;';
                    item.innerText = '◈ ' + n;
                    item.onclick = () => loadSpectrum(n);
                    box.appendChild(item);
                });
            } catch(e) {
                box.innerHTML = `<div class="content-body" style="color:#f55;">讀取失敗：${e.message}</div>`;
            }
        } else if (m === 'test') {
            // FIX v4: sw('test') handler
            triggerDiagnosis();
        }
    }

    async function trigger(action) {
        document.getElementById('res-box').innerHTML = "<div style='padding:20px; color:var(--main);'>◈ 校準頻率中...</div>";
        try {
            const res = await fetch(URL + '?action=' + action);
            const data = await res.json();
            document.getElementById('res-box').innerHTML = `<div style="border:1px solid var(--main); padding:30px; margin-top:20px; white-space:pre-wrap;">${(data.reply || '').replace(/\n/g, '<br>')}</div>`;
        } catch(e) {
            document.getElementById('res-box').innerHTML = `<div style="color:#f55; padding:20px;">讀取失敗：${e.message}</div>`;
        }
    }

    // Star canvas background
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    window.addEventListener('resize', resize);
    resize();
    for (let i = 0; i < 200; i++) {
        stars.push({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, r: Math.random() * 1.5, speed: Math.random() * 0.5 + 0.1 });
    }
    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,242,255,' + (Math.random() * 0.5 + 0.3) + ')';
            ctx.fill();
            s.y += s.speed;
            if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
        });
        requestAnimationFrame(drawStars);
    }
    drawStars();

    sw('01_虛源宣言_Declaration');
</script>
</body>
</html>
